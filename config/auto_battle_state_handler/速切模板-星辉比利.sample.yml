template_name: "速切模板-星辉比利"
handlers:
  - states: "[前台-星辉比利]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-星辉比利]"
    sub_handlers:
      - states: "[自定义-终结技被强制释放, 0, 1]"
        operations:
          - operation_template: "星辉比利-终结技"

      - states: "[自定义-黄光切人, 0, 1]"
        operations:
          - operation_template: "通用-支援攻击"

      - states: "[自定义-红光闪避, 0, 1]"
        operations:
          - operation_template: "通用-闪A"

      - states: "[自定义-连携换人, 0, 0.5]"
        operations:
          - operation_template: "通用-连携攻击"

      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        sub_handlers:
          - states: "[按键可用-快速支援, 0, 0.5]"
            operations:
              - op_name: "等待秒数"
                seconds: 1.0
          - states: ""
            operations:
              - op_name: "等待秒数"
                seconds: 0.3

      # 终结技可用
      - states: "[星辉比利-终结技可用]"
        operations:
          - operation_template: "星辉比利-终结技"

      # 决意 > 100 → 长按普攻
      - states: "[星辉比利-决心]{101, 120}"
        operations:
          - operation_template: "通用-长按普攻"

      # 特殊技可用 → 使用长按特殊技
      - states: "[星辉比利-特殊技可用]"
        operations:
          - operation_template: "通用-长按特殊攻击"



      # 默认：普攻1秒后合轴
      - states: ""
        interrupt_states: "[星辉比利-决心]{101, 120}"
        operations:
          - operation_template: "通用-切人普通攻击"