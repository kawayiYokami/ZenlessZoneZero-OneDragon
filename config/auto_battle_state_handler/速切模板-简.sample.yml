template_name: "速切模板-简"
handlers:
  - states: "[前台-简]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-简]"
    sub_handlers:
      - states: "[自定义-终结技被强制释放, 0, 1]"
        operations:
          - operation_template: "简-终结技"

      # 支援
      - states: "[自定义-黄光切人, 0, 1]"
        operations:
          - operation_template: "简-格挡攻击"

      - states: "[自定义-红光闪避, 0, 1]"
        operations:
          - operation_template: "简-闪A"

      # 连携
      - states: "[自定义-连携换人, 0, 0.5]"
        operations:
          - operation_template: "简-连携攻击"

      # 防呆
      - states: "([按键-切换角色-下一个, 0, 0.1]|[按键-切换角色-上一个, 0, 0.1])"
        debug_name: "切人后等待"
        sub_handlers:
          - states: ""
            operations:
              - op_name: "等待秒数"
                seconds: 0.1

      # 终结技时刻，需要注意出场第一秒可能识别错误
      - states: "[简-终结技可用] & [简-狂热心流]{0, 10}"
        operations:
          - operation_template: "简-终结技"

      # 朴实无华
      - states: "[简-特殊技可用] & [简-狂热心流]{10, 101}"
        operations:
          - operation_template: "简-强化特殊攻击"

        # 当前狂热心流不足50%且萨霍夫可使用则使用萨霍夫
      - states: "[简-狂热心流]{0, 50} & [简-萨霍夫跳]"
        operations:
          - operation_template: "简-长按A合轴"

      - states: "[简-终结技可用]"
        operations:
          - operation_template: "简-终结技"

      # 简6段a
      - states: ""
        operations:
          - operation_template: "简-普通攻击"
