template_name: "速切模板-佩洛伊斯"
handlers:
  - states: "[前台-佩洛伊斯]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-佩洛伊斯]"
    sub_handlers:
      # 终结技强制释放
      - states: "[自定义-终结技被强制释放, 0, 1]"
        debug_name: "佩洛伊斯-终结技强制"
        sub_handlers:
          - states: "[自定义-佩洛伊斯-buff, 0, 200]"
            debug_name: "佩洛伊斯-终结技-上"
            operations:
              - operation_template: "佩洛伊斯-终结技-上"
          - states: ""
            debug_name: "佩洛伊斯-终结技-下上buff"
            operations:
              - operation_template: "佩洛伊斯-终结技-下"
              - op_name: "设置状态"
                state: "自定义-佩洛伊斯-buff"

      # 黄光闪光 → 招架支援
      - states: "[自定义-黄光切人, 0, 1]"
        debug_name: "佩洛伊斯-黄光招架"
        operations:
          - operation_template: "通用-支援攻击"
          - op_name: "设置状态"
            state: "自定义-快速释放天光"

      # 红光闪光 → 特殊技/闪A
      - states: "[自定义-红光闪避, 0, 1]"
        debug_name: "佩洛伊斯-红光处理"
        sub_handlers:
          - states: "[佩洛伊斯-特殊技可用]"
            debug_name: "佩洛伊斯-红光强化特殊"
            operations:
              - operation_template: "佩洛伊斯-强化特殊技"
          - states: ""
            debug_name: "佩洛伊斯-红光闪A"
            operations:
              - operation_template: "通用-闪A"
              - op_name: "设置状态"
                state: "自定义-快速释放天光"

      # 连携换人
      - states: "[自定义-连携换人, 0, 0.5]"
        debug_name: "佩洛伊斯-连携攻击"
        operations:
          - operation_template: "佩洛伊斯-连携攻击"
          - op_name: "设置状态"
            state: "自定义-快速释放天光"

      # 切人后等待
      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "佩洛伊斯-切人等待"
        sub_handlers:
          - states: "[自定义-快速支援换人, 0, 0.5]"
            debug_name: "佩洛伊斯-等快速支援"
            operations:
              - op_name: "等待秒数"
                seconds: 0.3
              - op_name: "设置状态"
                state: "自定义-快速释放天光"
          - states: ""
            debug_name: "佩洛伊斯-等切人动画"
            operations:
              - op_name: "等待秒数"
                seconds: 0.3

      # 快速释放天光 + 日珥≥30 → 快速长按普攻
      - states: "[自定义-快速释放天光] & [佩洛伊斯-日珥]{30, 60}"
        debug_name: "佩洛伊斯-天光日珥足-长按"
        operations:
          - op_name: "清除状态"
            state_list: ["自定义-快速释放天光"]
          - operation_template: "佩洛伊斯-快速长按普攻"

      # 快速释放天光 + 日珥<30 → 直接清除
      - states: "[自定义-快速释放天光] & [佩洛伊斯-日珥]{0, 29}"
        debug_name: "佩洛伊斯-天光日珥不足-清除"
        operations:
          - op_name: "清除状态"
            state_list: ["自定义-快速释放天光"]

      # 终结技可用
      - states: "[佩洛伊斯-终结技可用] & ![自定义-不使用快速支援, -10, 0]"
        debug_name: "佩洛伊斯-终结技"
        sub_handlers:
          - states: "[自定义-佩洛伊斯-buff, 0, 200]"
            debug_name: "佩洛伊斯-终结技-上"
            operations:
              - operation_template: "佩洛伊斯-终结技-上"
              - op_name: "设置状态"
                state: "自定义-快速释放天光"
          - states: ""
            debug_name: "佩洛伊斯-终结技-下上buff"
            operations:
              - operation_template: "佩洛伊斯-终结技-下"
              - op_name: "设置状态"
                state: "自定义-佩洛伊斯-buff"

      # 失衡期间 → 强化特殊技
      - states: "[自定义-失衡时间, 0, 10] & [佩洛伊斯-特殊技可用]"
        debug_name: "佩洛伊斯-失衡强化特殊"
        operations:
          - operation_template: "佩洛伊斯-强化特殊技"

      # 默认普攻
      - states: ""
        debug_name: "佩洛伊斯-默认普攻"
        operations:
          - operation_template: "通用-普通攻击"
