# 文件: 速切模板-爱芮.yml
# 优化版 v4：修复黄光切人后发呆问题，延长黄光窗口至3秒，提升响应优先级
template_name: "速切模板-爱芮"
handlers:
  - states: "[前台-爱芮]"
    interrupt_states: "[前台-能量, 0, 0.1] & ![前台-爱芮]"
    sub_handlers:
      
      # ========== 黄光入场（招架支援）—— 最高优先级，时间窗口延长到3秒 ==========
      - states: "[自定义-黄光切人, 0, 3]"
        debug_name: "黄光支援"
        operations:
          - operation_template: "爱芮-支援攻击"
      
      # ========== 终结技被强制释放（连携等场景触发） ==========
      - states: "[自定义-终结技被强制释放, 0, 1]"
        debug_name: "强制终结技"
        operations:
          - operation_template: "爱芮-终结技"
      
      # ========== 红光闪避 ==========
      - states: "[自定义-红光闪避, 0, 1]"
        debug_name: "红光闪A"
        operations:
          - operation_template: "爱芮-闪A"
      
      # ========== 连携换人入场 ==========
      - states: "[自定义-连携换人, 0, 0.5]"
        debug_name: "连携入场"
        operations:
          - operation_template: "爱芮-连携攻击"
      
      # ========== 切人后等待（防抖） ==========
      - states: "([按键-切换角色-下一个, 0, 0.3]|[按键-切换角色-上一个, 0, 0.3])"
        debug_name: "切人后等待"
        sub_handlers:
          # 如果同时有黄光切人状态，优先执行支援攻击
          - states: "[自定义-黄光切人, 0, 3]"
            debug_name: "切人后黄光支援"
            operations:
              - operation_template: "爱芮-支援攻击"
          - states: "[按键可用-快速支援, 0, 0.5]"
            operations:
              - op_name: "等待秒数"
                seconds: 1.0
          - states: ""
            operations:
              - op_name: "等待秒数"
                seconds: 0.3
      
      # ========== 失衡期间决策（核心爆发期） ==========
      - states: "[自定义-失衡时间, -5, 15]"
        debug_name: "爱芮-失衡爆发期"
        sub_handlers:
          
          # P0 最高优先：有大招且未在妄想时刻 → 先开大
          - states: "[爱芮-终结技可用] & ![自定义-爱芮-妄想时刻, 0, 15]"
            debug_name: "失衡期优先终结技"
            operations:
              - operation_template: "爱芮-终结技"
              - op_name: "设置状态"
                state: "自定义-爱芮-妄想时刻"
                seconds: 15
              - op_name: "设置状态"
                state: "自定义-爱芮-开大完成待下砸"
                seconds: 3
          
          # P1 开大完成后或有妄想时刻 → 连续下砸（2点应援能量即可）
          - states: "([自定义-爱芮-开大完成待下砸, 0, 3] | [自定义-爱芮-妄想时刻, 0, 15]) & [爱芮-应援能量]{2, 8}"
            debug_name: "妄想时刻连续下砸"
            operations:
              - operation_template: "爱芮-绝对音准"
              - op_name: "设置状态"
                state: "自定义-爱芮-刚完成下砸"
                seconds: 1
          
          # P2 应援能量不足2点 → 用特殊技补能量
          - states: "[爱芮-应援能量]{0, 1} & [爱芮-特殊技可用] & [爱芮-能量]{40, 120}"
            debug_name: "失衡期补应援能量"
            operations:
              - operation_template: "爱芮-强化特殊技"
          
          # P3 没有终结技也没有特殊技 → 普攻攒能量
          - states: "![爱芮-终结技可用] & ![爱芮-特殊技可用]"
            debug_name: "失衡期普攻攒能"
            operations:
              - operation_template: "爱芮-普通攻击"
          
          # P4 仍有应援能量但未进入妄想时刻 → 继续下砸
          - states: "[爱芮-应援能量]{2, 8}"
            debug_name: "失衡期常规下砸"
            operations:
              - operation_template: "爱芮-绝对音准"
              - op_name: "设置状态"
                state: "自定义-爱芮-刚完成下砸"
                seconds: 1
          
          # P5 保底：普攻
          - states: ""
            debug_name: "失衡期保底普攻"
            operations:
              - operation_template: "爱芮-普通攻击"
      
      # ========== 下砸完成后主动合轴 ==========
      - states: "[自定义-爱芮-刚完成下砸, 0, 1]"
        debug_name: "下砸完成准备合轴"
        operations:
          - op_name: "清除状态"
            state: "自定义-爱芮-刚完成下砸"
          - op_name: "设置状态"
            state: "自定义-合轴时间"
      
      # ========== 音准完成后合轴（非失衡期小爆发用） ==========
      - states: "[自定义-爱芮-音准中, -3, 0] & ![自定义-失衡时间, -5, 15]"
        debug_name: "非失衡音准完成合轴"
        operations:
          - op_name: "设置状态"
            state: "自定义-合轴时间"
      
      # ========== 非失衡期间决策（速切攒能期） ==========
      - states: ""
        debug_name: "爱芮-非失衡速切期"
        sub_handlers:
          
          # 没有击破队友时，有大招直接放（避免喧响值溢出）
          - states: "[爱芮-终结技可用] & ![后台-1-击破] & ![后台-2-击破]"
            debug_name: "无击破直接开大"
            operations:
              - operation_template: "爱芮-终结技"
              - op_name: "设置状态"
                state: "自定义-爱芮-妄想时刻"
                seconds: 15
          
          # 应援能量≥6点：安全的小爆发窗口，打音准
          - states: "[爱芮-应援能量]{6, 8}"
            interrupt_states: "[爱芮-应援能量]{0, 2}"
            debug_name: "高能量非失衡小爆发"
            operations:
              - operation_template: "爱芮-绝对音准"
          
          # 能量即将溢出 → 放特殊技消耗
          - states: "[爱芮-能量]{100, 120} & [爱芮-特殊技可用]"
            debug_name: "能量满放特殊技防溢出"
            operations:
              - operation_template: "爱芮-强化特殊技"
          
          # 低应援能量(≤2)但有特殊技 → 快速打特殊技攒能
          - states: "[爱芮-应援能量]{0, 2} & [爱芮-特殊技可用] & [爱芮-能量]{40, 120}"
            debug_name: "低能量打特殊技攒能"
            operations:
              - operation_template: "爱芮-强化特殊技"
          
          # 核心改动：能量不足(3~5点)且没技能 → 别傻站着，直接合轴切队友！
          - states: "[爱芮-应援能量]{3, 5} & ![爱芮-特殊技可用]"
            debug_name: "能量不足主动合轴"
            operations:
              - op_name: "设置状态"
                state: "自定义-合轴时间"
              - op_name: "按键-普通攻击"
                post_delay: 0.1
                repeat: 3
          
          # 后台队友有技能可用时，主动合轴让队友补buff
          - states: "([后台-1-特殊技可用] & ![后台-1-击破]) | ([后台-2-特殊技可用] & ![后台-2-击破])"
            debug_name: "队友可用主动合轴"
            operations:
              - op_name: "设置状态"
                state: "自定义-合轴时间"
              - op_name: "按键-普通攻击"
                post_delay: 0.1
                repeat: 3
          
          # 保底策略：实在无事可做，打两下普攻就立刻合轴，绝不久留
          - states: ""
            debug_name: "无事可做速切"
            operations:
              - op_name: "按键-普通攻击"
                post_delay: 0.1
                repeat: 5
              - op_name: "设置状态"
                state: "自定义-合轴时间"