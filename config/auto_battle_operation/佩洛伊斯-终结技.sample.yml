# 终结技：3秒CG + 7秒无敌，总计7秒；先按终结技3秒，再按前方向3秒，等待1秒
operations:
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 6
  - op_name: "按键-终结技"
    post_delay: 0.1
    repeat: 30
  - op_name: "按键-移动-前-按下"
  - op_name: "等待秒数"
    seconds: 0.5
  - op_name: "按键-移动-前-松开"
  - op_name: "等待秒数"
    seconds: 0.5
  - op_name: "按键-移动-前-按下"
  - op_name: "等待秒数"
    seconds: 0.5
  - op_name: "按键-移动-前-松开"
  - op_name: "等待秒数"
    seconds: 0.5
  - op_name: "等待秒数"
    seconds: 1
