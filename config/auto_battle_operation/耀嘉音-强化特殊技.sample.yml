# 根据动画实测，总用时刚好就是用时极限，不打断时间就是极限无敌时间, 精准到0.1秒
operations:
  - op_name: "设置状态"
    state: "自定义-动作不打断"
    seconds: 1
  - op_name: "设置状态"
    state: "自定义-无视闪光"
    seconds: 0.3
  - op_name: "按键-切换角色"
    agent_name: "耀嘉音"
  - op_name: "按键-移动-前-按下"
  - op_name: "按键-特殊攻击"
    post_delay: 0.1
    repeat: 3
  - op_name: "等待秒数"
    seconds: 0.7